<!DOCTYPE html>
<html>
<head>
    <title>BLE Provisioning</title>
    <link rel="stylesheet"href="{{ url_for('static',filename='css/ble.css') }}">
</head>
<body>

<div class="container">
        <div class="logo">
         📡 
        </div>

        <h1>ESP32 BLE Provisioning</h1>

        <button id="scanBtn">
          Scan BLE Devices
        </button>

       <div class="card">
          <h3>Device Information</h3>

            <p>
                Device Name:
                <span id="deviceName">
                  Not Connected
                </span>
            </p>

            <p>
                  Status:
                 <span id="status">
                  Disconnected
                </span>
            </p>
        </div>


       <div class="card">
           <h3>WiFi Credentials</h3>

           <input
             type="text"
             id="ssid"
             placeholder="WiFi SSID"
            >

           <input
             type="password"
              id="password"
              placeholder="WiFi Password"
            >

            <button id="sendBtn">
             Send Credentials
            </button>
        </div>

</div>

<script src="{{ url_for('static',filename='js/ble.js') }}"></script>

</body>
</html>
